spring.application.name=user
server.port=8081

# MongoDB Configuration
spring.mongodb.uri=${MONGO_URI}
spring.mongodb.database=ecom_user

# Logging
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

#rabbitmq
#spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
#spring.rabbitmq.port=${RABBITMQ_PORT:5672}
#spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
#spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
#spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
#spring.rabbitmq.ssl.enabled=${RABBITMQ_SSL_ENABLED:false}

#Actuator
management.endpoints.web.exposure.include=*
app.message="working fine user"

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true


logging.file.name=logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

# Keycloak admin configuration
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:user}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
keycloak.admin.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8084}
keycloak.admin.realm=${KEYCLOAK_REALM:ecom-app}
keycloak.admin.client-id=${KEYCLOAK_CLIENT_ID:admin-cli}
keycloak.admin.client-uid=${KEYCLOAK_CLIENT_UID:d56541ac-6cd7-420b-bbc8-722633a337c2}
