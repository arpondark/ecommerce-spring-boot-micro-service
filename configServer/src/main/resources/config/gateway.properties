spring.application.name=gateway
server.port=8080

#Actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=ALWAYS
management.health.circuitbreakers.enabled=true

# Tracing
management.tracing.sampling.probability=1.0

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Logging
logging.file.name=logs/${spring.application.name}.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=10

# Circuit Breaker Configuration
spring.cloud.circuitbreaker.resilience4j.enabled=true
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.instances.ecomApp.base-config=default
resilience4j.circuitbreaker.instances.ecomApp.register-health-indicator=true
resilience4j.circuitbreaker.instances.ecomApp.sliding-window-size=10
resilience4j.circuitbreaker.instances.ecomApp.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.ecomApp.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.ecomApp.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.ecomApp.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.ecomApp.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.ecomApp.sliding-window-type=count_based
resilience4j.circuitbreaker.instances.ecomApp.allow-health-indicator-to-fail=true



