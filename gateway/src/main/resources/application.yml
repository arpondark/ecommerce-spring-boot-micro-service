spring:
  application:
    name: gateway

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
    metrics:
      export:
        enabled: true

#logging:
#  level:
#    org.springframework.cloud.gateway: TRACE
#  pattern:
#    level: "%5p [${spring.application.name:},%X{traceId},%X{spanId}]"

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

