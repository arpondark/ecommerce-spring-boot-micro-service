spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: product
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**
        - id: user
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/cart/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: TRACE

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
